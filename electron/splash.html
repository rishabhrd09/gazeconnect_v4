<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GazeConnect — Welcome</title>
<style>
/* Removed external Google fonts blocking the splash screen load */

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0c1520;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}

#bgCanvas{position:fixed;inset:0;z-index:0}

/* Subtle film grain overlay */
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* Vignette - soft edges */
.vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 90% 80% at 50% 45%,transparent 30%,rgba(8,12,18,0.55) 100%);
}

/* Corner marks */
.corner-tl{
  position:fixed;top:24px;left:28px;z-index:20;
  font-size:10px;font-weight:500;letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  opacity:0;animation:appear 0.8s ease 2.6s forwards;
}
.corner-tr{
  position:fixed;top:24px;right:28px;z-index:20;
  font-size:11px;font-weight:300;
  color:rgba(255,255,255,0.22);
  opacity:0;animation:appear 0.8s ease 2.6s forwards;
  font-variant-numeric:tabular-nums;letter-spacing:0.04em;
}

/* MAIN UI */
.ui{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

/* GAZE RETICLE LOGO */
.gaze-logo{
  position:relative;
  width:110px;height:110px;
  margin-bottom:36px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  animation:riseIn 1s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

/* Outer ambient glow */
.gaze-logo::before{
  content:'';
  position:absolute;inset:-30px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(180,160,255,0.08) 0%,transparent 70%);
  pointer-events:none;
}

/* Expand rings on load */
.expand-ring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.12);
  transform:translate(-50%,-50%) scale(0.5);
  opacity:0;
  animation:ringExpand 2s ease-out forwards;
}
.expand-ring:nth-child(1){width:160px;height:160px;animation-delay:0.5s}
.expand-ring:nth-child(2){width:210px;height:210px;animation-delay:0.65s;border-color:rgba(255,255,255,0.07)}
.expand-ring:nth-child(3){width:260px;height:260px;animation-delay:0.8s;border-color:rgba(255,255,255,0.04)}

@keyframes ringExpand{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  30%{opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}

/* THE RETICLE SVG */
#reticleSvg{
  width:110px;height:110px;
  animation:slowSpin 40s linear infinite;
}
@keyframes slowSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Pulse — the center dot breathes */
.center-pulse{
  position:absolute;top:50%;left:50%;
  width:10px;height:10px;
  margin:-5px 0 0 -5px;
  border-radius:50%;
  background:rgba(255,255,255,0.9);
  box-shadow:0 0 12px rgba(255,255,255,0.4);
  animation:dotPulse 3s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 8px rgba(255,255,255,0.3);transform:scale(1)}
  50%{box-shadow:0 0 18px rgba(200,180,255,0.6);transform:scale(1.1)}
}

/* WORDMARK */
.wordmark{
  font-size:12px;font-weight:500;
  letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);
  margin-bottom:28px;
  opacity:0;animation:riseIn 0.7s ease 0.9s forwards;
}
.wordmark span{color:rgba(255,255,255,0.2);margin:0 4px}

/* TEXT */
.text-block{
  text-align:center;
  opacity:0;
  animation:riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
}
.greeting{
  font-size:24px;font-weight:300;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.05em;margin-bottom:14px;
}
.name{
  font-size:clamp(52px,6.5vw,80px);
  font-weight:200;color:rgba(255,255,255,0.92);
  letter-spacing:-0.02em;line-height:1;
  margin-bottom:16px;
}
.name strong{
  font-weight:600;
  color:#FFF4E0;
}
.hindi{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:14px;font-weight:300;
  color:rgba(255,255,255,0.22);
  margin-bottom:24px;
  letter-spacing:0.02em;
}

/* Welcome + Hindi stacked */
.welcome-lines{
  margin-top:8px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.wline{
  font-size:24px;font-weight:300;
  color:rgba(255,255,255,0.72);
  letter-spacing:0.08em;
}
.wline-hi{
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:23px;font-weight:300;
  color:rgba(255,255,255,0.72);
  letter-spacing:0.03em;
}

/* STATUS PILL */
.pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:100px;
  padding:9px 18px;
  opacity:0;animation:riseIn 0.7s ease 1.9s forwards;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
}
.pill-dot{
  width:5px;height:5px;border-radius:50%;
  background:#5DFFA0;
  box-shadow:0 0 8px rgba(93,255,160,0.7);
  animation:blink 2.5s ease-in-out infinite;
  flex-shrink:0;
}
.pill-text{
  font-size:11px;font-weight:400;
  color:rgba(255,255,255,0.45);
  letter-spacing:0.06em;
}
.pill-sep{width:1px;height:10px;background:rgba(255,255,255,0.12);flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* PROGRESS */
.progress-wrap{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;animation:appear 0.6s ease 2.4s forwards;
}
.track{
  width:160px;height:1px;
  background:rgba(255,255,255,0.07);
  border-radius:1px;overflow:hidden;
}
.fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,rgba(255,255,255,0.1),rgba(255,255,255,0.5),rgba(200,180,255,0.4),rgba(255,255,255,0.1));
  animation:fillAnim 13s ease 2.4s forwards;
}
@keyframes fillAnim{
  0%{width:0%;opacity:1}
  70%{width:85%;opacity:1}
  92%{width:100%;opacity:1}
  100%{width:100%;opacity:0.6}
}
.prog-label{
  font-size:9px;font-weight:400;
  letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(255,255,255,0.15);
}

/* LIGHT PILLARS */
.pillars{
  position:fixed;bottom:0;left:0;right:0;height:65%;
  z-index:2;pointer-events:none;
  display:flex;align-items:flex-end;justify-content:center;gap:0;
  overflow:hidden;
}
.pillar{
  flex-shrink:0;
  width:1px;
  opacity:0;
  animation:pillarUp 2.5s ease-out forwards;
}
@keyframes pillarUp{
  0%{opacity:0;height:0%}
  15%{opacity:1}
  70%{opacity:0.5}
  100%{opacity:0;height:100%}
}

/* FADE OUT (triggered by Electron before closing) */
.ui.out{animation:exitOut 0.9s cubic-bezier(0.4,0,1,1) forwards!important}
#bgCanvas.out,.grain.out,.vignette.out,.pillars.out{animation:exitOut 0.9s cubic-bezier(0.4,0,1,1) forwards!important}
@keyframes exitOut{to{opacity:0;filter:blur(4px)}}

/* KEYFRAMES */
@keyframes riseIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes appear{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="grain"></div>
<div class="vignette"></div>
<div class="pillars" id="pillars"></div>

<div class="corner-tl">GazeConnect</div>
<div class="corner-tr" id="clock"></div>

<div class="ui" id="ui">

  <!-- LOGO: Refined Enable-Gaze reticle style -->
  <div class="gaze-logo">
    <div class="expand-ring"></div>
    <div class="expand-ring"></div>
    <div class="expand-ring"></div>

    <svg id="reticleSvg" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="rg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
        </radialGradient>
      </defs>

      <circle cx="55" cy="55" r="50" stroke="rgba(255,255,255,0.18)" stroke-width="0.75">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
      </circle>
      <circle cx="55" cy="55" r="36" stroke="rgba(255,255,255,0.12)" stroke-width="0.6">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      </circle>
      <circle cx="55" cy="55" r="22" stroke="rgba(255,255,255,0.22)" stroke-width="0.8">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
      </circle>

      <!-- Cardinal tick marks -->
      <line x1="55" y1="5"  x2="55" y2="13" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-linecap="round">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
      </line>
      <line x1="55" y1="97" x2="55" y2="105" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-linecap="round">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
      </line>
      <line x1="5"  y1="55" x2="13" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-linecap="round">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
      </line>
      <line x1="97" y1="55" x2="105" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-linecap="round">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
      </line>

      <!-- Minor tick marks (diagonals) -->
      <line x1="19.5" y1="19.5" x2="24.5" y2="24.5" stroke="rgba(255,255,255,0.22)" stroke-width="0.7">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      </line>
      <line x1="90.5" y1="19.5" x2="85.5" y2="24.5" stroke="rgba(255,255,255,0.22)" stroke-width="0.7">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      </line>
      <line x1="19.5" y1="90.5" x2="24.5" y2="85.5" stroke="rgba(255,255,255,0.22)" stroke-width="0.7">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      </line>
      <line x1="90.5" y1="90.5" x2="85.5" y2="85.5" stroke="rgba(255,255,255,0.22)" stroke-width="0.7">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      </line>

      <!-- Crosshair lines -->
      <line x1="55" y1="33" x2="55" y2="19" stroke="rgba(255,255,255,0.3)" stroke-width="0.6">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
      </line>
      <line x1="55" y1="77" x2="55" y2="91" stroke="rgba(255,255,255,0.3)" stroke-width="0.6">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
      </line>
      <line x1="33" y1="55" x2="19" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="0.6">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
      </line>
      <line x1="77" y1="55" x2="91" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="0.6">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
      </line>

      <!-- Subtle fill -->
      <circle cx="55" cy="55" r="21.5" fill="url(#rg)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.1s" fill="freeze"/>
      </circle>

      <!-- Center dot -->
      <circle cx="55" cy="55" r="3.5" fill="rgba(255,255,255,0.9)" opacity="0" filter="url(#dotGlow)">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
        <animate attributeName="r" values="0;3.5" dur="0.3s" begin="1.2s" fill="freeze"/>
      </circle>

      <defs>
        <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Activation pulse from center -->
      <circle cx="55" cy="55" r="3.5" stroke="rgba(255,255,255,0.6)" stroke-width="0.8" fill="none" opacity="0">
        <animate attributeName="r" values="3.5;22;22" dur="1.8s" begin="1.4s" repeatCount="3"/>
        <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.1;1" dur="1.8s" begin="1.4s" repeatCount="3"/>
      </circle>
    </svg>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">GazeConnect</div>

  <!-- Text -->
  <div class="text-block">
    <div class="greeting" id="greet">Good morning</div>
    <div class="name"><strong id="userName">Papa</strong></div>
    <div class="welcome-lines">
      <div class="wline">Welcome</div>
      <div class="wline-hi">आपका स्वागत है</div>
    </div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-wrap">
  <div class="track"><div class="fill"></div></div>
  <div class="prog-label">Preparing your workspace</div>
</div>

<script>
// Clock
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
tick();setInterval(tick,1000);

// Greeting
const h=new Date().getHours();
document.getElementById('greet').textContent=h<12?'Good morning':h<17?'Good afternoon':'Good evening';

// Background canvas
const cv=document.getElementById('bgCanvas');
const cx=cv.getContext('2d');
let W,H;

function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;drawBg()}
resize();addEventListener('resize',resize);

function drawBg(){
  cx.clearRect(0,0,W,H);

  // Base sky
  const sky=cx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#071018');
  sky.addColorStop(0.28,'#0d1e2e');
  sky.addColorStop(0.52,'#142435');
  sky.addColorStop(0.70,'#1c2830');
  sky.addColorStop(0.82,'#2c2218');
  sky.addColorStop(0.92,'#3d2510');
  sky.addColorStop(1,'#4a2808');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H);

  // Teal atmospheric left haze
  const teal=cx.createRadialGradient(W*0.1,H*0.3,0,W*0.1,H*0.3,W*0.55);
  teal.addColorStop(0,'rgba(20,120,130,0.18)');
  teal.addColorStop(0.4,'rgba(10,90,100,0.09)');
  teal.addColorStop(1,'transparent');
  cx.fillStyle=teal;cx.fillRect(0,0,W,H);

  // Right teal echo
  const tealR=cx.createRadialGradient(W*0.9,H*0.25,0,W*0.9,H*0.25,W*0.4);
  tealR.addColorStop(0,'rgba(20,110,120,0.14)');
  tealR.addColorStop(1,'transparent');
  cx.fillStyle=tealR;cx.fillRect(0,0,W,H);

  // Horizon saffron glow
  const hor=cx.createRadialGradient(W*0.5,H*0.88,0,W*0.5,H*0.88,W*0.65);
  hor.addColorStop(0,'rgba(220,120,30,0.42)');
  hor.addColorStop(0.18,'rgba(190,90,20,0.22)');
  hor.addColorStop(0.38,'rgba(140,60,10,0.12)');
  hor.addColorStop(0.6,'rgba(80,40,10,0.06)');
  hor.addColorStop(1,'transparent');
  cx.fillStyle=hor;cx.fillRect(0,0,W,H);

  // Subtle violet crown
  const vio=cx.createRadialGradient(W*0.5,0,0,W*0.5,0,H*0.45);
  vio.addColorStop(0,'rgba(80,70,160,0.12)');
  vio.addColorStop(1,'transparent');
  cx.fillStyle=vio;cx.fillRect(0,0,W,H);

  // Horizon hard line — landscape silhouette
  cx.save();
  cx.globalAlpha=0.35;

  // Far mountains
  cx.fillStyle='#0e1a22';
  cx.beginPath();
  cx.moveTo(0,H);
  cx.bezierCurveTo(W*0.12,H*0.74,W*0.22,H*0.70,W*0.35,H*0.73);
  cx.bezierCurveTo(W*0.48,H*0.76,W*0.52,H*0.70,W*0.60,H*0.68);
  cx.bezierCurveTo(W*0.70,H*0.66,W*0.82,H*0.72,W,H*0.76);
  cx.lineTo(W,H);cx.closePath();cx.fill();

  // Foreground ground
  cx.globalAlpha=0.55;
  cx.fillStyle='#070e15';
  cx.beginPath();
  cx.moveTo(0,H);
  cx.bezierCurveTo(W*0.15,H*0.84,W*0.3,H*0.82,W*0.45,H*0.86);
  cx.bezierCurveTo(W*0.6,H*0.90,W*0.75,H*0.83,W,H*0.85);
  cx.lineTo(W,H);cx.closePath();cx.fill();
  cx.restore();

  // Horizon reflection/water shimmer
  cx.save();
  cx.globalAlpha=0.12;
  const shimmer=cx.createLinearGradient(W*0.2,H*0.82,W*0.8,H*0.82);
  shimmer.addColorStop(0,'transparent');
  shimmer.addColorStop(0.3,'rgba(220,150,60,0.8)');
  shimmer.addColorStop(0.5,'rgba(240,180,80,1)');
  shimmer.addColorStop(0.7,'rgba(220,150,60,0.8)');
  shimmer.addColorStop(1,'transparent');
  cx.fillStyle=shimmer;
  cx.fillRect(W*0.1,H*0.819,W*0.8,1.5);
  cx.restore();

  // Stars
  cx.save();
  for(let i=0;i<90;i++){
    const sx=(Math.sin(i*137.5+0.5)*0.5+0.5)*W;
    const sy=(Math.cos(i*97.3+1)*0.5+0.5)*H*0.58;
    const sa=0.06+Math.abs(Math.sin(i*1.7))*0.22;
    const sr=0.25+Math.abs(Math.sin(i*0.9))*0.55;
    const pct=sy/(H*0.58);
    cx.globalAlpha=sa*(1-pct*0.7);
    cx.fillStyle=pct<0.35?'#C8D8FF':'rgba(255,255,255,0.9)';
    cx.beginPath();cx.arc(sx,sy,sr,0,Math.PI*2);cx.fill();
  }
  cx.restore();
}

// Light pillars
const pillarsEl=document.getElementById('pillars');
const N=28;
for(let i=0;i<N;i++){
  const p=document.createElement('div');
  p.className='pillar';
  const h2=20+Math.random()*70;
  const delay=(0.1+Math.random()*2).toFixed(2);
  const dur=(1.8+Math.random()*1.4).toFixed(2);
  const maxOp=(0.12+Math.random()*0.18).toFixed(2);
  const warm=Math.random()>0.45;
  p.style.cssText=
    'height:'+h2+'%;'+
    'animation-duration:'+dur+'s;'+
    'animation-delay:'+delay+'s;'+
    'margin:0 '+(6+Math.random()*18)+'px;'+
    'background:'+(warm
      ?'linear-gradient(to top,rgba(200,110,30,'+maxOp+'),rgba(220,140,50,'+(parseFloat(maxOp)*0.5).toFixed(3)+'),transparent)'
      :'linear-gradient(to top,rgba(60,140,160,'+(parseFloat(maxOp)*0.8).toFixed(3)+'),rgba(80,160,180,'+(parseFloat(maxOp)*0.4).toFixed(3)+'),transparent)'
    )+';';
  pillarsEl.appendChild(p);
}

// Fade-out function — called by Electron before closing this window
window.startFadeOut = function() {
  document.getElementById('ui').classList.add('out');
  document.getElementById('bgCanvas').classList.add('out');
  document.querySelector('.grain').classList.add('out');
  document.querySelector('.vignette').classList.add('out');
  document.querySelector('.pillars').classList.add('out');
  document.querySelector('.progress-wrap').classList.add('out');
  document.querySelector('.corner-tl').classList.add('out');
  document.querySelector('.corner-tr').classList.add('out');
};
</script>
</body>
</html>
